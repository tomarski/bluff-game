<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="robots" content="index,follow">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Bluff">
    <meta name="google-site-verification" content="YA0EctNcIWt2fcysd3XaPlNiBih4BG6TF7RYXn5RlDs" />
    <title>Blöf Oyunu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="image/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="image/apple-touch-icon.png" />
</head>
<body>

    <div id="toast-notification" class="toast hidden"></div>

    <div id="main-menu">
        <h1>Blöf</h1>
        <h2>Bullsh*t</h2>
        
        <div style="margin-bottom: 20px;">
            <label for="player-nickname" style="font-weight: bold; color: #ffcc00; display: block; margin-bottom: 8px;">Takma Adın: </label>
            <input type="text" id="player-nickname" value="Oyuncu" style="padding: 10px; font-size: 16px; text-align: center; border-radius: 5px; border: none; width: 230px;" maxlength="15">
        </div>

        <div class="menu-buttons">
            <div style="margin-bottom: 10px;">
                <label for="difficulty-select" style="font-weight: bold; color: #ffcc00;">Zorluk Seviyesi: </label>
                <select id="difficulty-select" style="padding: 10px; font-size: 16px;">
                    <option value="easy">Kolay</option>
                    <option value="medium" selected>Orta</option>
                    <option value="hard">Zor</option>
                </select>
            </div>
            <button id="start-game-button">Oyuna Başla</button>
            <button id="about-button">Nasıl Oynanır?</button>
            <button id="mute-toggle-menu" class="audio-btn">🔊 Ses: Açık</button>
        </div>

        <div class="footer-container">
            <p>© 2026 Tomarski</p>
            <a href="https://github.com/tomarski" target="_blank" class="footer-github-link">
            <svg height="14" width="14" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: middle;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg> GitHub</a>
        </div>
    </div>

    <div id="game-board" class="hidden">
        <div class="top-right-controls">
            <button id="mute-toggle-game" class="game-mute-btn">🔊</button>
            <button id="settings-toggle-btn" class="game-settings-btn">⚙️</button>
            
            <div id="settings-dropdown" class="settings-menu hidden">
                <button id="restart-button">🔄 Yeniden Başlat</button>
                <button id="back-menu-button">🏠 Ana Menü</button>
            </div>
        </div>

        <h1>Blöf</h1>
        <h2>Bullsh*t</h2>
        
        <div id="cpu-area" class="player-zone" style="position: relative;">
            <h3>Rakip (Bot) <span id="cpu-difficulty-badge" style="font-size: 12px; background: #ffcc00; color: black; padding: 2px 6px; border-radius: 3px; margin-left: 5px;">Orta</span></h3>
            <p>Kalan Kart: <span id="cpu-card-count">13</span></p>
            <div id="cpu-chat-bubble" class="chat-bubble hidden">Merhaba!</div>
        </div>

        <div id="table-center">
            <h3>Ortadaki Deste</h3>
            <div id="pot-info">Yerdeki Kart Sayısı: <span id="pot-count">0</span></div>
            <div id="last-played-info">Yerdeki Son İddia: <span id="last-rank">Yok</span></div>
            
            <div id="revealed-cards-container" class="hidden"></div>

            <button id="bs-button" disabled>BLÖF (BS)!</button>
        </div>

        <div id="player-area" class="player-zone">
            <h3>Senin Elin</h3>
            <div id="player-cards"></div>
            
            <div id="claim-controls">
                <label for="claim-select">İddia Et: </label>
                <select id="claim-select"></select>
                <button id="play-turn-button">Kartı At</button>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message">Bildirim Mesajı</p>
            <button id="modal-close-button">Tamam</button>
            <div id="modal-gameover-buttons" class="hidden" style="display: flex; justify-content: center; gap: 15px; margin-top: 15px;">
                <button id="modal-restart-btn" style="background: #5bc0de; color: white;">🔄 Yeniden Başla</button>
                <button id="modal-menu-btn" style="background: #777; color: white;">🏠 Ana Menü</button>
            </div>
        </div>
    </div>

    <audio id="sound-shuffle" src="sounds/shuffle.mp3" preload="auto"></audio>
    <audio id="sound-play" src="sounds/play.mp3" preload="auto"></audio>
    <audio id="sound-win" src="sounds/gamewin.mp3" preload="auto"></audio>
    <audio id="sound-over" src="sounds/gameover.mp3" preload="auto"></audio>
    <audio id="sound-bullshit" src="sounds/bullshit.mp3" preload="auto"></audio>
    <audio id="sound-ohshit" src="sounds/ohshit.mp3" preload="auto"></audio>
    <audio id="sound-laugh" src="sounds/laugh.mp3" preload="auto"></audio>
    <audio id="sound-bluff" src="sounds/bluff.mp3" preload="auto"></audio>
    <audio id="sound-funnylaugh" src="sounds/funnylaugh.mp3" preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
